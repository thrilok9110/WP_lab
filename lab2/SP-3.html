<!DOCTYPE html>

<html>

<head>

<title>HTML Inline CSS</title>

<!internal CSS>

<style type="text/css">

.blue { color:blue;}

.thick{

font-size:20px;

}

</style>

</head>

<body>


<p style="color:red;">This is red</p>

<p class = "blue">This is blue</p>

<p class = "thick">This is thick</p>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Basic Web Page</title>
</head>
<body>


    <h1>Student Information Page</h1>

   
    <p>This page demonstrates basic HTML tags, lists, text boxes and button.</p>

    
    <h3>Subjects (Ordered List)</h3>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h3>Departments (Unordered List)</h3>
    <ul>
        <li>CSE</li>
        <li>ECE</li>
        <li>EEE</li>
        <li>CIVIL</li>
    </ul>

    <h3>Enter Your Details</h3>

    <form>
        Name: <input type="text" name="name"><br><br>
        Phone Number: <input type="text" name="phone"><br><br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>
